<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AI Company Enrichment</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

</head>

<body class="bg-light">

<div class="container mt-4">

<h1 class="text-center mb-4">
AI Company Enrichment
</h1>

<div class="card p-3 shadow">

<input
id="url"
class="form-control mb-3"
placeholder="Enter Company URL"
>

<button
class="btn btn-primary"
onclick="enrich()"
>
Enrich
</button>

<button
class="btn btn-success mt-2"
onclick="showResults()"
>
Show All Results
</button>

<div
id="loading"
class="mt-3 text-primary fw-bold"
></div>

</div>

<div
id="output"
class="mt-4"
></div>

</div>

<script>

async function enrich(){

document.getElementById(
"loading"
).innerHTML =
"Loading...";

const url =
document.getElementById(
"url"
).value;

const response =
await fetch(
"/enrich",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
url:url
})
}
);

const data =
await response.json();

document.getElementById(
"loading"
).innerHTML="";

displayCard(data);

}

function displayCard(data){

document.getElementById(
"output"
).innerHTML =
`

<div class="card shadow p-4">

<h2>${data.company_name}</h2>

<p>
<b>Website:</b>
${data.website_name}
</p>

<p>
<b>Email:</b>
${data.mail.join(", ")}
</p>

<p>
<b>Phone:</b>
${data.mobile_number}
</p>

<p>
<b>Core Service:</b><br>
${data.core_service}
</p>

<p>
<b>Target Customer:</b><br>
${data.target_customer}
</p>

<p>
<b>Pain Point:</b><br>
${data.probable_pain_point}
</p>

<p>
<b>Outreach:</b><br>
${data.outreach_opener}
</p>

</div>

`;
}

async function showResults(){

document.getElementById(
"loading"
).innerHTML =
"Loading Results...";

const response =
await fetch(
"/results"
);

const data =
await response.json();

document.getElementById(
"loading"
).innerHTML="";

let html="";

for(let company of data){

html +=

`
<div class="card shadow p-3 mb-3">

<h3>${company.company_name}</h3>

<p>
<b>Website:</b>
${company.website_name}
</p>

<p>
<b>Core Service:</b>
${company.core_service}
</p>

<p>
<b>Email:</b>
${company.mail.join(", ")}
</p>

</div>
`;

}

document.getElementById(
"output"
).innerHTML = html;

}

</script>

</body>
</html>
